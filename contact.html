<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact & Support — ZERØ CLOTHING</title>
  <meta name="description" content="Get in touch with ZERØ CLOTHING — WhatsApp, email, FAQ, shipping, returns and business hours. Customer support for Sri Lanka." />
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div id="loader"><div class="loader-inner"><div class="loader-mark"><span>ZERØ</span></div><div class="loader-bar"><i></i></div><div class="loader-pct">SAY HELLO</div></div></div>
  <div id="site-header-mount"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Contact</span></nav>
        <p class="eyebrow" data-reveal>We're Here To Help</p>
        <h1 class="h-xl" data-reveal>Get In Touch</h1>
      </div>
    </section>

    <section class="section container">
      <div class="contact-grid">
        <div>
          <h2 class="h-md mb-m" data-reveal>Send A Message</h2>
          <form id="contactForm" data-reveal>
            <div class="field--row"><div class="field"><label>Name</label><input required placeholder="Your name"></div><div class="field"><label>Email</label><input type="email" required placeholder="you@email.lk"></div></div>
            <div class="field"><label>Subject</label><select><option>Order Enquiry</option><option>Custom Design Help</option><option>Shipping & Returns</option><option>Wholesale / Collab</option><option>Other</option></select></div>
            <div class="field"><label>Message</label><textarea rows="5" required placeholder="How can we help?"></textarea></div>
            <button class="btn btn--primary btn--lg" type="submit"><span>Send Message</span></button>
          </form>
        </div>
        <div class="contact-info" data-reveal="right">
          <a class="info-card" href="https://wa.me/94778691065"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M21 11.5a8.5 8.5 0 0 1-12.5 7.5L3 21l2-5.5A8.5 8.5 0 1 1 21 11.5z"/></svg></span><div><b>WhatsApp</b><small>077 869 1065 · Fastest response</small></div></a>
          <a class="info-card" href="mailto:hello@zeroclothing.lk"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span><div><b>Email</b><small>hello@zeroclothing.lk</small></div></a>
          <div class="info-card"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span><div><b>Business Hours</b><small>Mon–Sat · 9:00 AM – 7:00 PM</small></div></div>
          <div class="info-card"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M12 21s7-6 7-11a7 7 0 0 0-14 0c0 5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span><div><b>Studio</b><small>Colombo 05, Sri Lanka · Pickup available</small></div></div>
          <div class="map-ph ph" data-label="GOOGLE MAPS · COLOMBO 05"></div>
        </div>
      </div>
    </section>

    <section class="section container" id="faq" style="border-top:1px solid var(--line-soft)">
      <div class="section-head text-center" style="align-items:center"><p class="eyebrow">Need Answers</p><h2 class="h-lg">Frequently Asked Questions</h2></div>
      <div class="accordion" id="faqAcc" style="max-width:760px;margin:0 auto"></div>
    </section>
  </main>

  <div id="site-footer-mount"></div>
  <div id="drawer-mount"></div>
  <script>window.ZERO_PAGE = "contact";</script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/mockups.js"></script>
  <script src="assets/js/contact.js"></script>
</body>
</html>
