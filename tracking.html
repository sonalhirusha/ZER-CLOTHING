<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Your Order — ZERØ CLOTHING</title>
  <meta name="description" content="Track your ZERØ order by order number, phone or email. Live status timeline from production to delivery." />
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div id="loader"><div class="loader-inner"><div class="loader-mark"><span>ZERØ</span></div><div class="loader-bar"><i></i></div><div class="loader-pct">TRACKING</div></div></div>
  <div id="site-header-mount"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Track Order</span></nav>
        <p class="eyebrow" data-reveal>Live Updates</p>
        <h1 class="h-xl" data-reveal>Track Your Order</h1>
      </div>
    </section>

    <section class="section container">
      <div class="track-box" data-reveal>
        <div class="track-tabs">
          <button class="sel" data-track="order">Order Number</button>
          <button data-track="phone">Phone</button>
          <button data-track="email">Email</button>
        </div>
        <div class="field"><label id="trackLabel">Order Number</label><input id="trackInput" placeholder="ZRO-AB123"></div>
        <button class="btn btn--primary btn--block" id="trackBtn"><span>Track Order</span></button>
        <div id="trackResult" style="margin-top:30px"></div>
      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>
  <div id="drawer-mount"></div>
  <script>window.ZERO_PAGE = "tracking";</script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/tracking.js"></script>
</body>
</html>
