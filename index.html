<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>ZERØ CLOTHING</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #000; overflow: hidden; }

      .splash {
        position: relative;
        display: block;
        width: 100%;
        height: 100vh;
        height: 100svh;
        background: #000 url("assets/vanguard-poster.jpg") center / cover no-repeat;
        overflow: hidden;
        cursor: pointer;
      }

      /* The looping background video, fades + scales in, then slowly zooms */
      .splash__video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transform: scale(1.08);
        animation:
          fade-in 1.4s ease-out forwards,
          ken-burns 24s ease-in-out 1.4s infinite alternate;
      }

      /* Subtle depth overlay, also fades in */
      .splash__overlay {
        position: absolute;
        inset: 0;
        opacity: 0;
        background:
          radial-gradient(120% 120% at 50% 30%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
        animation: fade-in 2s ease-out 0.3s forwards;
        pointer-events: none;
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.9); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes ken-burns {
        from { transform: scale(1.08); }
        to   { transform: scale(1.18); }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash__video { animation: fade-in 0.6s ease-out forwards; transform: none; }
        .splash__overlay { animation: fade-in 0.6s ease-out forwards; }
      }
    </style>
  </head>

  <body>
    <!-- Main page: only the image + video + animation. Tap to enter the store. -->
    <a class="splash" href="store.html" aria-label="Enter ZERØ Clothing">
      <video class="splash__video" autoplay muted loop playsinline preload="auto"
             poster="assets/vanguard-poster.jpg">
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260606_154941_df1a96e1-a06f-450c-bd02-d863414cc1a0.mp4" type="video/mp4" />
      </video>
      <div class="splash__overlay"></div>
    </a>
  </body>
</html>
